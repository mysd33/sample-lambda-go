# More information about the configuration file can be found here:
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
version = 0.1

[default]
[default.global.parameters]
stack_name = "todo-go-app"
region = "ap-northeast-1"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
s3_prefix = "todo-go-app"
image_repositories = []
resolve_s3 = true
parameter_overrides = "StackPrefix=\"Demo\" TracingValue=\"Active\" Stage=\"Prod\" MemorySize=\"128\" Timeout=\"15\" HelloWorldFunctionName=\"hello-world\" UsersFunctionName=\"user-function\" TodoFunctionName=\"todo-function\" BooksFunctionName=\"book-function\" BffFunctionName=\"bff-function\" TodoAsyncFunctionName=\"todo-async-function\" TodoAsyncFifoFunctionName=\"todo-async-fifo-function\" LogLevel=\"DEBUG\" LogRetensionInDays=\"7\" ADOTCollectorLayerArn=\"arn:aws:lambda:ap-northeast-1:901920570463:layer:aws-otel-collector-amd64-ver-0-117-0:1\" AppConfigLayerArn=\"arn:aws:lambda:ap-northeast-1:980059726660:layer:AWS-AppConfig-Extension:268\" LambdaInsightsLayerArn=\"arn:aws:lambda:ap-northeast-1:580247275435:layer:LambdaInsightsExtension:91\" EnableLambdaLayers=\"true\""


[default.package.parameters]
[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

[prd.deploy.parameters]
stack_name = "todo-go-app-prd"
resolve_s3 = true
s3_prefix = "todo-go-app"
region = "ap-northeast-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = "StackPrefix=\"Demo\" TracingValue=\"Active\" Stage=\"Prod\" MemorySize=\"128\" Timeout=\"15\" HelloWorldFunctionName=\"hello-world\" UsersFunctionName=\"user-function\" TodoFunctionName=\"todo-function\" BooksFunctionName=\"book-function\" BffFunctionName=\"bff-function\" TodoAsyncFunctionName=\"todo-async-function\" TodoAsyncFifoFunctionName=\"todo-async-fifo-function\" LogLevel=\"DEBUG\" LogRetensionInDays=\"7\" ADOTCollectorLayerArn=\"arn:aws:lambda:ap-northeast-1:901920570463:layer:aws-otel-collector-amd64-ver-0-117-0:1\" AppConfigLayerArn=\"arn:aws:lambda:ap-northeast-1:980059726660:layer:AWS-AppConfig-Extension:268\" LambdaInsightsLayerArn=\"arn:aws:lambda:ap-northeast-1:580247275435:layer:LambdaInsightsExtension:91\" EnableLambdaLayers=\"true\""
image_repositories = []

[local.local_start_api.parameters]
warm_containers = "EAGER"
parameter_overrides = "EnableLambdaLayers=\"false\""

[local.local_start_lambda.parameters]
warm_containers = "EAGER"
parameter_overrides = "EnableLambdaLayers=\"false\""
